<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhay Marketing Website</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#050714;
      color:white;
      text-align:center;
    }

    header{
      padding:20px;
      background:#0f1730;
      font-size:22px;
      font-weight:bold;
    }

    section{
      padding:80px 20px;
    }

    .card{
      background:#0f1730;
      padding:20px;
      margin:20px auto;
      max-width:500px;
      border-radius:12px;
      border:1px solid #1f2a44;
    }

    .btn{
      padding:12px 20px;
      background:#38bdf8;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:hover{
      background:#0ea5e9;
    }

    footer{
      padding:20px;
      border-top:1px solid #1f2a44;
      color:#aaa;
    }
  </style>

</head>

<body>

<header>
  Abhay Marketing Website
</header>

<section>
  <h1>Welcome 🚀</h1>
  <p>Simple AI Marketing Website (No Login System)</p>

  <div class="card">
    <h2>Our Services</h2>
    <p>✔ SEO</p>
    <p>✔ Social Media Marketing</p>
    <p>✔ Lead Generation</p>
    <p>✔ Business Growth</p>
  </div>

  <div class="card">
    <h2>Contact Us</h2>
    <button class="btn">WhatsApp Now</button>
  </div>
</section>

<footer>
  © 2026 Abhay Marketing
</footer>

</body>
</html>
