<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhay SaaS OS - Complete System</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:#050714;color:white;}

    header{
      position:fixed;top:0;width:100%;
      background:rgba(5,10,25,0.85);
      backdrop-filter:blur(12px);
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 10%;border-bottom:1px solid #1f2a44;
    }

    .logo{color:#38bdf8;font-weight:800;}

    section{padding:100px 10%;text-align:center;}

    .card{
      max-width:700px;
      margin:auto;
      background:#0f1730;
      border:1px solid #1f2a44;
      border-radius:12px;
      padding:20px;
      text-align:left;
    }

    input,textarea{
      width:100%;padding:12px;margin-top:10px;
      border:none;border-radius:8px;outline:none;
    }

    button{
      margin-top:12px;
      padding:12px;
      width:100%;
      background:#38bdf8;
      border:none;
      font-weight:700;
      cursor:pointer;
      border-radius:8px;
    }

    button:hover{background:#0ea5e9;}

    .hidden{display:none;}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .box{
      background:#0f1730;
      border:1px solid #1f2a44;
      padding:15px;
      border-radius:10px;
    }

    .tag{
      padding:4px 10px;
      background:#38bdf8;
      color:black;
      border-radius:20px;
      font-size:12px;
      display:inline-block;
      margin-top:5px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">SAAS OS</div>
  <button onclick="logout()">Logout</button>
</header>

<section id="auth">
  <div class="card">
    <h2>Login / Signup</h2>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>
</section>

<section id="app" class="hidden">

  <div class="card">
    <h2>Dashboard</h2>
    <p id="user"></p>
    <p id="role"></p>
    <p id="plan"></p>
  </div>

  <br/>

  <div class="card">
    <h3>Create Lead (CRM)</h3>
    <input id="leadName" placeholder="Lead Name" />
    <input id="leadEmail" placeholder="Lead Email" />
    <button onclick="addLead()">Save Lead</button>
  </div>

  <br/>

  <div class="card">
    <h3>My Leads</h3>
    <div id="leads"></div>
  </div>

  <br/>

  <div class="card">
    <h3>Upgrade Plan</h3>
    <button onclick="upgrade('basic')">Basic</button>
    <button onclick="upgrade('pro')">Pro</button>
    <button onclick="upgrade('elite')">Elite</button>
  </div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

window.signup = async function(){
  let email=document.getElementById('email').value;
  let pass=document.getElementById('password').value;

  const res = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",res.user.uid),{
    email,
    role:"user",
    plan:"free"
  });

  document.getElementById('msg').innerText="Account Created";
}

window.login = async function(){
  let email=document.getElementById('email').value;
  let pass=document.getElementById('password').value;

  await signInWithEmailAndPassword(auth,email,pass);
}

onAuthStateChanged(auth,async(user)=>{
  if(!user){
    document.getElementById('auth').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    return;
  }

  currentUser=user;

  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.data();

  document.getElementById('user').innerText="User: "+data.email;
  document.getElementById('role').innerText="Role: "+data.role;
  document.getElementById('plan').innerText="Plan: "+data.plan;

  loadLeads();
});

window.logout=()=>signOut(auth);

window.addLead=async function(){
  let name=document.getElementById('leadName').value;
  let email=document.getElementById('leadEmail').value;

  await addDoc(collection(db,"leads"),{
    uid:currentUser.uid,
    name,email
  });

  loadLeads();
}

async function loadLeads(){
  let q=await getDocs(collection(db,"leads"));
  let html="";

  q.forEach(d=>{
    let x=d.data();
    if(x.uid===currentUser.uid){
      html+=`<div class='box'>${x.name} - ${x.email}</div>`;
    }
  });

  document.getElementById('leads').innerHTML=html;
}

window.upgrade=async function(plan){
  await setDoc(doc(db,"users",currentUser.uid),{
    plan
  },{merge:true});

  alert("Plan updated: "+plan);
}

</script>

</body>
</html>
