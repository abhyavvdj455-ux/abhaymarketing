<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Cricket App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1f;
  color:white;
}

/* TOP BAR */
.header{
  background:#111a33;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

/* MATCH CARD */
.match{
  background:#151f3d;
  margin:10px;
  padding:15px;
  border-radius:12px;
  border:1px solid #2a3763;
}

.team{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin:5px 0;
}

/* BUTTON */
.btn{
  background:#38bdf8;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover{
  background:#0ea5e9;
}

/* PLAYER LIST */
.player{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #2a3763;
}

.selected{
  color:#00ff99;
}

/* SCREEN */
.screen{
  display:none;
  padding:10px;
}

.active{
  display:block;
}
</style>
</head>

<body>

<div class="header">🏏 Fantasy Cricket Pro (Demo)</div>

<!-- HOME -->
<div id="home" class="screen active">

  <div class="match">
    <div class="team">India vs Australia</div>
    <div class="team">Time: Live</div>
    <button class="btn" onclick="openTeam()">Create Team</button>
  </div>

  <div class="match">
    <div class="team">India vs Pakistan</div>
    <div class="team">Time: 7:30 PM</div>
    <button class="btn" onclick="openTeam()">Create Team</button>
  </div>

</div>

<!-- TEAM -->
<div id="team" class="screen">

  <h3>Select Players</h3>

  <div id="players"></div>

  <button class="btn" onclick="startMatch()">Join Contest</button>

  <h3>Score: <span id="score">0</span></h3>

</div>

<script>

let players = [
  "Virat Kohli",
  "Rohit Sharma",
  "Dhoni",
  "Gill",
  "Pant",
  "Hardik Pandya"
];

let selected = [];

function openTeam(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("team").classList.add("active");
  renderPlayers();
}

function renderPlayers(){
  document.getElementById("players").innerHTML =
    players.map((p,i)=>`
      <div class="player">
        <span class="${selected.includes(i)?'selected':''}">${p}</span>
        <button onclick="toggle(${i})">
          ${selected.includes(i) ? "Remove" : "Select"}
        </button>
      </div>
    `).join("");
}

function toggle(i){
  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
  } else {
    selected.push(i);
  }
  renderPlayers();
}

function startMatch(){
  if(selected.length === 0){
    alert("Select players first");
    return;
  }

  let score = 0;

  selected.forEach(()=>{
    score += Math.floor(Math.random()*100);
  });

  document.getElementById("score").innerText = score;

  alert("Contest Joined! Score: " + score);
}

</script>

</body>
</html>
