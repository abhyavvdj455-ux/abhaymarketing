<!DOCTYPE html>
<html>
<head>
  <title>Fantasy Cricket Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#070b1a;
      color:white;
    }

    header{
      padding:15px;
      background:#111a33;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:15px;
      display:grid;
      gap:15px;
      max-width:800px;
      margin:auto;
    }

    .card{
      background:#151f3d;
      padding:15px;
      border-radius:12px;
      border:1px solid #26325a;
    }

    .player{
      display:flex;
      justify-content:space-between;
      padding:8px;
      border-bottom:1px solid #2a3763;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{background:#0ea5e9;}

    .selected{
      color:#00ff99;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    input{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      margin-top:5px;
    }

    .big{
      font-size:22px;
      font-weight:bold;
      color:#38bdf8;
    }
  </style>
</head>

<body>

<header>🏏 Fantasy Cricket PRO</header>

<div class="container">

  <!-- TEAM NAME -->
  <div class="card">
    <h3>Create Team</h3>
    <input id="teamName" placeholder="Enter Team Name">
    <button onclick="saveTeam()">Save Team</button>
  </div>

  <!-- PLAYERS -->
  <div class="card">
    <h3>Select Players</h3>
    <div id="players"></div>
    <button onclick="playMatch()">Start Match</button>
  </div>

  <!-- SCORE -->
  <div class="card">
    <h3>Total Score</h3>
    <div class="big" id="score">0</div>
  </div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h3>Leaderboard</h3>
    <div id="board">No matches yet</div>
  </div>

</div>

<script>
let players = [
  {name:"Virat", selected:false},
  {name:"Rohit", selected:false},
  {name:"Dhoni", selected:false},
  {name:"Gill", selected:false},
  {name:"Pant", selected:false},
  {name:"Hardik", selected:false}
];

let history = JSON.parse(localStorage.getItem("history") || "[]");

// render players
function render(){
  let html="";
  players.forEach((p,i)=>{
    html+=`
      <div class="player">
        <span class="${p.selected?'selected':''}">${p.name}</span>
        <button onclick="toggle(${i})">
          ${p.selected?"Remove":"Select"}
        </button>
      </div>
    `;
  });
  document.getElementById("players").innerHTML=html;
}
render();

function toggle(i){
  players[i].selected = !players[i].selected;
  render();
}

// save team
function saveTeam(){
  let name = document.getElementById("teamName").value;
  if(!name){
    alert("Enter team name");
    return;
  }

  localStorage.setItem("team", name);
  alert("Team Saved ✔ " + name);
}

// play match
function playMatch(){
  let selected = players.filter(p=>p.selected);

  if(selected.length < 1){
    alert("Select players first");
    return;
  }

  let total = 0;
  let resultText = "";

  selected.forEach(p=>{
    let points = Math.floor(Math.random()*100);
    total += points;
    resultText += `${p.name}: ${points} pts\n`;
  });

  document.getElementById("score").innerText = total;

  // save history
  let team = localStorage.getItem("team") || "My Team";

  history.push({
    team,
    score: total,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  renderBoard();
}

// leaderboard
function renderBoard(){
  if(history.length === 0){
    document.getElementById("board").innerHTML="No matches yet";
    return;
  }

  let html = "";
  history.slice().reverse().forEach(h=>{
    html += `
      <p>
        🏆 <b>${h.team}</b> → ${h.score} pts <br>
        <small>${h.time}</small>
      </p>
    `;
  });

  document.getElementById("board").innerHTML = html;
}

renderBoard();
</script>

</body>
</html>
